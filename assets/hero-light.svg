  <text x="600" y="200" text-anchor="middle" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="18" font-weight="500" letter-spacing="5" fill="#57606a">AI ENGINEER&#160;&#160;·&#160;&#160;AGENTIC SYSTEMS&#160;&#160;·&#160;&#160;CLAUDE / MCP TOOLING</text>
